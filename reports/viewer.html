<header>
  <span class="icon">📊</span>
  <h1>정보 수집 보고서 뷰어</h1>
  <span class="badge" id="run-count"></span>
</header>

<div class="layout">
  <!-- 왼쪽: Markdown 뷰어 -->
  <main id="viewer">
    <div id="md-body"></div>
  </main>

  <!-- 오른쪽: 실행 횟수 리스트 -->
  <aside id="sidebar">
    <div class="sidebar-title">실행 목록</div>
    <div id="run-list"></div>
  </aside>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const raw = document.getElementById('md-raw').textContent.trim();

  // H1 "# 정보 수집 보고서" 앞에서 분할
  const parts = raw
    .split(/(?=^# 정보 수집 보고서)/m)
    .map(s => s.trim())
    .filter(Boolean);

  function getLabel(text, idx) {
    const m = text.match(/\((\d+회차)\)/);
    return m ? m[1] : `${idx + 1}회차`;
  }

  document.getElementById('run-count').textContent = `총 ${parts.length}회 수집`;

  const mdBody = document.getElementById('md-body');

  function renderSection(text) {
    mdBody.innerHTML = marked.parse(text);

    // 테이블의 "요약" 헤더가 있는 열 인덱스를 찾아 td에 클래스 부여
    mdBody.querySelectorAll('table').forEach(table => {
      const headers = Array.from(table.querySelectorAll('thead th, tr:first-child th'));
      const summaryIdx = headers.findIndex(th => th.textContent.trim() === '요약');
      if (summaryIdx < 0) return;
      table.querySelectorAll('tbody tr').forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells[summaryIdx]) cells[summaryIdx].classList.add('col-summary');
      });
    });

    // URL만 있는 td → 클릭 가능한 링크로 변환
    mdBody.querySelectorAll('td').forEach(td => {
      const t = td.textContent.trim();
      if (!td.querySelector('a') && /^https?:\/\//.test(t)) {
        td.innerHTML = `<a href="${t}" target="_blank" rel="noopener">${t}</a>`;
      }
    });

    // 모든 링크 새 탭으로
    mdBody.querySelectorAll('a[href]').forEach(a => {
      if (!a.href.startsWith('#')) { a.target = '_blank'; a.rel = 'noopener'; }
    });

    document.getElementById('viewer').scrollTop = 0;
  }

  const runList = document.getElementById('run-list');
  parts.forEach((section, i) => {
    const label = getLabel(section, i);
    const btn = document.createElement('button');
    btn.className = 'run-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="run-num">${i + 1}</span>${label}`;
    btn.addEventListener('click', () => {
      runList.querySelectorAll('.run-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSection(section);
    });
    runList.appendChild(btn);
  });

  if (parts.length > 0) renderSection(parts[0]);
</script>
</body>
